front:
  text: 五燈儀同卷為三
  hash: sha256:8cc0c5338127aba09d561f6802f48104253c100f74e97b6fd46277ddc60160f1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0203_HFL_000-001a, image: hfl/0083/0083-094.png}
body:
  text: 三官燈儀玄帝燈儀九天三茅司命仙燈儀萬靈燈儀五顯靈觀大帝燈儀三官燈儀法事如式伏聞玄元妙道運一氣而肇乾坤清濁殊分備三才而明日月顯晦分於晝夜寒暑布於四時人本沖和為萬類之最靈性本清虛因五行而受賦列尊卑於貴賤應罪福於因緑是以三官考校賞功過以無私五帝紀明著愆非而有在切以人生下境命係上天星辰運轉值流逆而照臨運限推遷遇刑剋而衝併或動止悮違於五典或命運值罹於三災殺生縱意於貪婪益巳損彼而不善惡言呪咀或違犯於天基營造興工或冒干於地府至於六根三業種種過愆非憑道力無以蠲除今辰某慶逢吉旦節屇上中下元當三官考校之辰乃九天賜福之㑹所以齊戒身心精崇淨供華燈遍照於層霄銀燭交輝於星漢紅蓮萬朵齊開於三五之期醁酒三斟供獻於百千之聖沉檀芬馥遙達於金闕之天仙範吟哦速徹於玉清之界輒伸丹悃仰叩洪禧法衆虔誠讃揚功德信禮無上大羅天長生保命護身天尊臣衆等志心歸命上元一品九氣賜福天官紫微大帝一切神仙諸靈官伏聞自然大聖降九天太極之權總主上真御七寶紫微之闕降鳯輦於舉遷之㑹回雲軿於上中下元之辰校録天人標提功過屇三陽而賜福合九氣以流輝今辰某注想髙明傾心酌獻仰玄都而設像建淨宇之陳儀志心歸命上元一品九氣賜福天官紫微帝君伏願沖鑒融明純禧錫善北都幽籍永詮不朽之名南昌上宫克注長生之字生生道備世世心清稽首皈依虔誠讃詠信禮髙上紫微宫九氣賜福天官真都元陽紫微宫主自然大聖賜福天官統攝天界役使鬼神鳴鐘擊鼓乘車駕雲隊仗千萬統攝天兵滌除凶穢去濁流清上帝有勑普濟含靈祛邪輔正保天長存臣衆等志心歸命中元二品七氣赦罪地官清虛大帝一切神仙諸靈官伏聞太陽殿上仰大道之清虛洞隂闕中瞻元君而洞耀五嶽八紘之類㑹校録於慶生九幽三府之流願關宣而赦罪矧兹下土實仰元恩今辰某澡滌塵襟虔遵聖範仰洞靈而設像建淨宇以陳儀志心歸命中元二品赦罪地官清虛大帝伏願啓耀流光歆誠矚懇削愆尤於動植得遂生成施善利於飛潜咸臻寧晏至仁廣度品物蒙庥稽首皈依虔誠讃詠信禮髙上洞空宫七氣赦罪地官中兄赦罪主帝元君靈真大聖社稷之神滋生萬物長養下民祛除妖怪掃蕩邪氛乘雲跨虎遊行乾坤保安家國內外咸寧蠲消九橫馘滅五瘟流祥賜福與道合真臣衆等志心歸命五氣解厄水官暘谷神王一切神仙諸靈官伏聞金靈炳景水官理暘谷之宫寶曆分權大帝主洞隂之道定川源之品彚考江海之威靈㑹五氣於建生無幽不燭遵群倫之解厄有願皆從今長某夙幸崇真無生奉教仰扶桑之設像建淨宇以陳儀志心歸命下元三品解厄水官暘谷神王伏願飈馭俯回精崇仰達長生大聖願延海宇之生度厄尊神以解存亡之厄福祥至止禍患潜消稽首皈依虔誠讃詠信禮髙上洞源宫五氣解厄水官下元解厄金闕洞隂大帝水君清泠之神乘雲御氣搜捉邪精驅雷逐電海晏河清平波伏浪役使風雲敢有小鬼輒惱生靈寸尸萬斷永不留形凶穢消蕩道氣長存諷經宣疏回向三官燈儀終
